name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # Oldest supported runtime (must match requires-python in pyproject.toml).
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --group dev --extra sqlalchemy

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format)
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy approck_fastapi_utils

      - name: Pytest
        run: uv run pytest
